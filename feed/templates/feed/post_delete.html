{% extends "feed/base.html" %}

{% block content %}
<div class="content-section text-center">
    <h3 class="text-danger">⚠️ Delete Post</h3>
    <p class="lead">Are you sure you want to delete <strong>"{{ post.title }}"</strong>?</p>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <a class="btn btn-outline-secondary" href="{% url 'details' post.id %}">Cancel</a>
        <input class="btn btn-danger" type="submit" value="Yes, delete">
    </form>
</div>
{% endblock content %}
