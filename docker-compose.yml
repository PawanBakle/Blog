version: "3.9"

services:
  db:
    image: postgres:13
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: blogx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post@123

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
      - media_volume:/code/media  
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=blogx
      - DB_USER=postgres
      - DB_PASSWORD=post@123
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data:
  media_volume: